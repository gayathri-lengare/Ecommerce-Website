<section class="container py-5">
  <div class="row">

    <!-- LEFT SIDE -->
    <div class="col-md-7">
      <div class="card shadow p-4">

        <h4 class="mb-4">Shipping Details</h4>

        <form [formGroup]="checkoutForm">

          <div class="row">
            <div class="col-md-6 mb-3">
              <input class="form-control" placeholder="Full Name" formControlName="name">
            </div>

            <div class="col-md-6 mb-3">
              <input class="form-control" placeholder="Email" formControlName="email">
            </div>
          </div>

          <div class="mb-3">
            <input class="form-control" placeholder="Phone Number" formControlName="phone">
          </div>

          <div class="mb-3">
            <input class="form-control" placeholder="Address" formControlName="address">
          </div>

          <div class="row">
            <div class="col-md-4 mb-3">
              <input class="form-control" placeholder="City" formControlName="city">
            </div>
            <div class="col-md-4 mb-3">
              <input class="form-control" placeholder="State" formControlName="state">
            </div>
            <div class="col-md-4 mb-3">
              <input class="form-control" placeholder="Pincode" formControlName="pincode">
            </div>
          </div>

          <h5 class="mt-3">Payment Method</h5>

          <div class="form-check">
            <input class="form-check-input" type="radio" value="cod" formControlName="paymentMethod">
            <label class="form-check-label">Cash on Delivery</label>
          </div>

          <div class="form-check">
            <input class="form-check-input" type="radio" value="card" formControlName="paymentMethod">
            <label class="form-check-label">Credit/Debit Card</label>
          </div>

        </form>

      </div>
    </div>

    <!-- RIGHT SIDE -->
    <div class="col-md-5">
      <div class="card shadow p-4">

        <h4>Order Summary</h4>
        <hr>

        <p><strong>{{ product.name }}</strong></p>
        <p>Price: ₹{{ product.price }}</p>
        <p>Quantity: {{ product.quantity }}</p>
        <p>Delivery: ₹{{ deliveryCharge }}</p>

        <hr>

        <h5>Total: ₹{{ totalAmount }}</h5>

        <button class="btn btn-success w-100 mt-3"
                (click)="placeOrder()">
          Place Order
        </button>

      </div>
    </div>

  </div>
</section>
